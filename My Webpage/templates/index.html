<!DOCTYPE html>
<html lang="en">
<head>
    <title>Snake Game</title>
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #2c3e50; 
            color: white;
            font-family: Arial, sans-serif;
        }
        .btn {
            padding: 15px 30px;
            font-size: 20px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:hover { background-color: #2ecc71; }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <h1>Ready to Play?</h1>
        <a href="{{ url_for('game') }}" class="btn">Start Snake</a>
    </div>
</body>
</html>
